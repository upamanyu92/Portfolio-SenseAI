services:
  - type: web
    name: portfoliosense-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: cache
          property: connectionString

  - type: worker
    name: portfoliosense-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: arq app.worker.WorkerSettings
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: cache
          property: connectionString

  - type: redis
    name: cache
    ipAllowList: []
